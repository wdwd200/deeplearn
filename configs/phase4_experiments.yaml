experiment:
  training_seeds:
    - 0
    - 1
    - 2
  episodes: 300
  max_steps: 100
  eval_interval: 10
  evaluation_episodes: 5
  eval_scenarios_path: configs/phase4_eval_scenarios.yaml

training:
  batch_size: 128
  replay_size: 100000
  start_steps: 1000
  hidden_sizes:
    - 256
    - 256
  activation: relu
  train_every: 100
  updates_per_train: 1
  reward_scale: 1.0
  save_interval: 50
  normalizer_enabled: true
  normalizer_clip: 5.0

output:
  root_dir: results/phase4

algorithms:
  td3:
    gamma: 0.99
    tau: 0.005
    actor_lr: 0.0003
    critic_lr: 0.0003
    policy_noise: 0.2
    noise_clip: 0.5
    policy_delay: 2
    exploration_noise: 0.1
    exploration_noise_decay: 0.995
    min_exploration_noise: 0.02

  ddpg:
    gamma: 0.99
    tau: 0.005
    actor_lr: 0.0003
    critic_lr: 0.0003
    exploration_noise: 0.1
    exploration_noise_decay: 0.995
    min_exploration_noise: 0.02

  sac:
    gamma: 0.99
    tau: 0.005
    actor_lr: 0.0003
    critic_lr: 0.0003
    entropy_coef: 0.2

ablations:
  A0_full_td3:
    label: A0 full TD3
    description: Full TD3 with communication model and reward.
    env_overrides: {}
    fixed_z_action: false

  A1_isotropic_antenna:
    label: A1 isotropic antenna
    description: Remove elevation-dependent antenna gain.
    env_overrides:
      antenna:
        model: isotropic
    fixed_z_action: false

  A2_no_balance_penalty:
    label: A2 no balance penalty
    description: Set omega_B to zero.
    env_overrides:
      reward:
        omega_B: 0.0
    fixed_z_action: false

  A3_no_energy_penalty:
    label: A3 no energy penalty
    description: Set omega_E to zero.
    env_overrides:
      reward:
        omega_E: 0.0
    fixed_z_action: false

  A4_fixed_relay_height:
    label: A4 fixed relay height
    description: Force relay vertical velocity to zero.
    env_overrides: {}
    fixed_z_action: true
